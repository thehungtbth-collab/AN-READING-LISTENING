ct-opt','wrong-opt'));\n\tdocument.querySelectorAll('.prog-correct, .prog-wrong').forEach(e=>e.classList.remove('prog-correct','prog-wrong'));\n    document.querySelectorAll('.mcq-mark').forEach(e=>e.innerText='');\n\n    let score = 0, total = 0;\n    \n    // 1. CHECK HEADINGS\n    if(headings.length > 0) {\n        document.querySelectorAll('.heading-drop').forEach(z => {\n            const pIdx = z.dataset.para, userVal = (z.dataset.val || \"\").toUpperCase(), correctVal = (headingKey[pIdx] || \"\").toUpperCase();\n            if(correctVal) { \n                total++; \n                const fb = document.getElementById('fb-h-'+pIdx);\n                if(userVal === correctVal) { \n                    fb.innerHTML = '<span class=\"correct\">✓</span>'; \n                    score++; \n                } else {\n                    fb.innerHTML = `<span class=\"wrong\">✗</span> <span class=\"correct\">${correctVal}</span>`; \n                }\n            }\n        });\n    }\n\n    // 2. CHECK QUESTIONS\n    qs.forEach(q => {\n        if(q.type === 'summary' || q.type === 'gap-fill-block') {\n            total += q.gapIds.length;\n            q.gapIds.forEach(gid => {\n                let userVal = \"\";\n                let el = null;\n                const keyVal = (q.answers[gid] || \"\").trim();\n\n                if(q.type==='summary') { \n                    el=document.getElementById('dz-'+gid); \n                    userVal = el?el.innerText.trim():\"\"; \n                    if(el) {\n                        if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('correct-zone'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { \n                             el.classList.add('wrong-zone'); \n                             el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`);\n                             document.getElementById('prog-'+gid).classList.add('prog-wrong');\n                        }\n                    }\n                }\n                if(q.type==='gap-fill-block') { \n                    el=document.querySelector(`input[data-gid=\"${gid}\"]`); \n                    userVal = el?el.value.trim():\"\"; \n                    if(el) {\n                         if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('input-correct'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { \n                             el.classList.add('input-wrong');\n                             el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`);\n                             document.getElementById('prog-'+gid).classList.add('prog-wrong');\n                        }\n                    }\n                }\n            });\n        } \n        // ĐƯA MCQ25 RA THÀNH MỘT KHỐI ĐỘC LẬP TẠI ĐÂY\n        else if (q.type === 'mcq25') {\n            total += 2;\n            const checkboxes = document.querySelectorAll(`input[name=\"mcq25_${q.id}\"]:checked`);\n            let userVals = Array.from(checkboxes).map(cb => cb.value.toUpperCase());\n            let correctVals = q.gapIds.map(gid => (q.answers[gid] || \"\").toUpperCase().trim());\n            let origCorrectVals = [...correctVals];\n\n            let localScore = 0;\n            userVals.forEach(uv => {\n                const idx = correctVals.indexOf(uv);\n                if (idx > -1) { localScore++; correctVals[idx] = null; } \n            });\n            score += localScore;\n\n            const allCheckboxes = document.querySelectorAll(`input[name=\"mcq25_${q.id}\"]`);\n            allCheckboxes.forEach((cb, i) => {\n                const val = cb.value.toUpperCase();\n                const markSpan = document.getElementById(`mcq25-mark-${q.id}-${i}`);\n                const label = cb.closest('label');\n                \n                label.style.border = 'none';\n                label.style.padding = '0';\n                label.style.backgroundColor = 'transparent';\n                if(markSpan) markSpan.innerHTML = '';\n                \n                const isCorrectOption = origCorrectVals.includes(val);\n\n                if (cb.checked) {\n                    if (isCorrectOption) {\n                        if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold;\">✓</span>';\n                        label.style.border = '2px dashed #16a34a';\n                        label.style.padding = '4px 8px';\n                        label.style.borderRadius = '6px';\n                        label.style.backgroundColor = '#f0fdf4';\n                    } else {\n                        if(markSpan) markSpan.innerHTML = '<span style=\"color:#dc2626; font-weight:bold;\">✗</span>';\n                        label.style.border = '2px dashed #dc2626';\n                        label.style.padding = '4px 8px';\n                        label.style.borderRadius = '6px';\n                        label.style.backgroundColor = '#fef2f2';\n                    }\n                } else if (isCorrectOption) {\n                    if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold; font-size:11px; margin-left:4px;\">(Key)</span>';\n                    label.style.border = '2px dashed #16a34a';\n                    label.style.padding = '4px 8px';\n                    label.style.borderRadius = '6px';\n                    label.style.backgroundColor = '#f0fdf4';\n                }\n            });\n\n            let p1 = document.getElementById('prog-'+q.gapIds[0]), p2 = document.getElementById('prog-'+q.gapIds[1]);\n            if (localScore === 2) { p1.classList.add('prog-correct'); p2.classList.add('prog-correct'); }\n            else if (localScore === 1) { p1.classList.add('prog-correct'); p2.classList.add('prog-wrong'); }\n            else { p1.classList.add('prog-wrong'); p2.classList.add('prog-wrong'); }\n\n            if (localScore < 2) document.getElementById('fb-'+q.id).innerHTML = `<span class=\"wrong\">✗ Correct: ${origCorrectVals.join(', ')}</span>`;\n            else document.getElementById('fb-'+q.id).innerHTML = '<span class=\"correct\">✓ Correct</span>';\n        }\n        // ĐIỀU KIỆN CHO CÁC CÂU HỎI THÔNG THƯỜNG\n        else if (q.id) {\n            total++;\n            let u=\"\", ok=false;\n            const keyVal = (q.correctAnswer||\"\").trim();\n            \n            if(q.type==='mcq') {\n                 const inputs = document.querySelectorAll(`input[name=\"q${q.id}\"]`);\n                 let selectedIdx = -1;\n                 inputs.forEach((inp, idx) => {\n                     if(inp.checked) { u = inp.value; selectedIdx = idx; }\n                 });\n                 if(keyVal.toLowerCase().startsWith(u.toLowerCase()) && u) ok=true;\n                 if(selectedIdx !== -1) {\n                     const markSpan = document.getElementById(`mcq-mark-${q.id}-${selectedIdx}`);\n                     if(markSpan) markSpan.innerHTML = ok ? '<span style=\"color:#16a34a\">✓</span>' : '<span style=\"color:#dc2626\">✗</span>';\n                 }\n            }\n            if(q.type==='gap-fill') {\n                const el = document.querySelector(`input[data-id=\"${q.id}\"]`);\n                u = el ? el.value.trim() : \"\";\n                if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\n                if(el) {\n                    if(ok) el.classList.add('input-correct');\n                    else { el.classList.add('input-wrong'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); }\n                }\n            }\n            if(q.type==='tfng' || q.type==='ynng') {\n                 const inputName = q.type === 'tfng' ? `tfng${q.id}` : `ynng${q.id}`;\n                 const checked = document.querySelector(`input[name=\"${inputName}\"]:checked`);\n                 u = checked ? checked.value : \"\";\n                 \n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\n                 \n                 if(checked) {\n                     const btn = checked.nextElementSibling;\n                     if(ok) btn.classList.add('correct-opt');\n                     else {\n                         btn.classList.add('wrong-opt');\n                         document.getElementById('fb-'+q.id).insertAdjacentHTML('afterbegin', `<span class=\"ans-key\" style=\"margin-bottom:5px; display:inline-block\">${keyVal}</span> `);\n                     }\n                 } else if (!ok) {\n                     document.getElementById('fb-'+q.id).innerHTML += `<span class=\"ans-key\">${keyVal}</span>`;\n                 }\n            }\n            if(q.type==='mif') {\n                 const checked = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n                 u = checked ? checked.value : \"\";\n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\n                 if(checked) {\n                     const circle = checked.nextElementSibling;\n                     if(ok) circle.classList.add('correct-opt');\n                     else circle.classList.add('wrong-opt');\n                 }\n            }\n\n            if(ok) {\n                score++;\n                document.getElementById('prog-'+q.id).classList.add('prog-correct');\n            } else {\n                document.getElementById('prog-'+q.id).classList.add('prog-wrong');\n            }\n            \n            if(!ok && q.type !== 'summary' && q.type !== 'gap-fill-block') {\n                 const fb = document.getElementById('fb-'+q.id);\n                 fb.innerHTML = `<span class=\"wrong\">✗ Your: ${u||\"(empty)\"}</span> <span class=\"correct\">Key: ${keyVal}</span>`;\n            } else if(ok && q.type !== 'summary' && q.type !== 'gap-fill-block') {\n                 document.getElementById('fb-'+q.id).innerHTML = '<span class=\"correct\">✓ Correct</span>';\n            }\n        }\n    });\n\t\n\t\n    alert(`Score: ${score} / ${total}`);\n};\n\nwindow.toggleInlineMif = (qId, pChar) => {\n    const btn = document.querySelector(`.mif-inline-box[data-para=\"${pChar}\"] .mif-inline-btn[data-qid=\"${qId}\"]`);\n    if(!btn) return;\n    const isSelected = btn.classList.contains('selected');\n    \n    if (isSelected) {\n        // Bỏ chọn\n        btn.classList.remove('selected');\n        const radio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n        if(radio) radio.checked = false;\n        \n        // Hiện lại câu này ở các Passage khác\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(el => el.classList.remove('hidden-by-other'));\n        \n        // Tắt màu xanh Palette nếu ko còn chọn gì\n        const anyChecked = document.querySelector(`input[name=\"mif${qId}\"]:checked`);\n        if(!anyChecked) document.getElementById('prog-'+qId).classList.remove('filled');\n    } else {\n        // Chọn\n        btn.classList.add('selected');\n        const radio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n        if(radio) radio.checked = true;\n        \n        // Ẩn câu này khỏi các Passage khác\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(el => {\n            if(el !== btn) { el.classList.remove('selected'); el.classList.add('hidden-by-other'); }\n        });\n        document.getElementById('prog-'+qId).classList.add('filled');\n    }\n};\n\n// Đồng bộ ngược: Khi học sinh tick Radio bên cột phải, tự động ẩn/hiện hộp ở cột trái\nsetTimeout(() => {\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            \n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}, 500);\n// Utils\nwindow.toggleTrans=id=>document.getElementById(id).classList.toggle('hidden');\nconst rs=document.getElementById('rs'),lp=document.getElementById('lp');\nlet x=0,w=0,md=e=>{x=e.clientX;w=lp.offsetWidth;document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)};\nlet mm=e=>lp.style.width=((w+e.clientX-x)/rs.parentElement.offsetWidth*100)+'%';\nlet mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};\nrs.addEventListener('mousedown',md);\n\nconst pp=document.getElementById('popup');\ndocument.querySelectorAll('.vocab').forEach(s=>{\n  s.onclick=e=>{\n    const v=vocab.find(x=>x.id===s.dataset.vid);if(!v)return;\n    pp.innerHTML=`<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n    pp.style.display='block';pp.style.top=(e.clientY+10)+'px';pp.style.left=Math.min(e.clientX,window.innerWidth-330)+'px';\n    e.stopPropagation();\n  }\n});\ndocument.onclick=e=>{if(!pp.contains(e.target) && e.target.id !== 'hl-btn') pp.style.display='none'};\nwindow.speak=t=>window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));\n\n/* ================================\n   GAME SCRIPT LOGIC\n   ================================ */\n\n/* ====== trạng thái ====== */\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\nconst engListEl = document.getElementById('engList');\nconst vieListEl = document.getElementById('vieList');\nconst scoreEl = document.getElementById('score');\nconst confettiEl = document.getElementById('confetti');\n\n/* helper shuffle */\nfunction shuffleArray(arr){\n  const a = arr.slice();\n  for(let i=a.length-1;i>0;i--){\n    const j = Math.floor(Math.random()*(i+1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\n\n/* init */\nfunction initGame(){\n  state.matches = {}; state.score = 0;\n  if(pairs.length === 0) {\n      engListEl.innerHTML = '<div style=\"color:white;padding:20px\">No vocab data selected in the Generator!</div>';\n      return;\n  }\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\n}\n\n/* render eng */\nfunction renderEng(){\n  engListEl.innerHTML = '';\n  state.engOrder.forEach((origIndex, pos) => {\n    const p = pairs[origIndex];\n    const item = document.createElement('div');\n    item.className = 'g-eng-item';\n    item.dataset.origIndex = origIndex;\n    item.innerHTML = `\n      <div class=\"g-eng-left\">\n        <div class=\"g-index\">${pos+1}</div>\n        <div>\n          <div style=\"font-weight:700\">${p.eng}</div>\n          <div style=\"font-size:13px; color:var(--muted)\">English</div>\n        </div>\n      </div>\n      <div class=\"g-slot\" data-index=\"${origIndex}\" aria-label=\"drop slot\" tabindex=\"0\"><div class=\"inner\"></div></div>\n    `;\n    engListEl.appendChild(item);\n  });\n}\n\n/* render vie */\nfunction renderVie(){\n  vieListEl.innerHTML = '';\n  state.shuffledVie.forEach((text, idx) => {\n    const d = document.createElement('div');\n    d.className = 'g-vie-item';\n    d.draggable = true;\n    d.dataset.text = text;\n    d.id = 'vie-'+idx;\n    d.innerHTML = `<span style=\"font-weight:600\">${text}</span>`;\n    vieListEl.appendChild(d);\n\n    d.addEventListener('dragstart', e => {\n      d.classList.add('dragging');\n      e.dataTransfer.setData('text/plain', text);\n      currentPicked = {text, el:d};\n    });\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\n    d.addEventListener('click', () => {\n      if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; }\n      else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; }\n    });\n  });\n}\n\n/* drag & drop */\nfunction attachSlotEvents(){\n  const slots = document.querySelectorAll('.g-slot');\n  slots.forEach(slot => {\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\n    slot.addEventListener('drop', e => {\n      e.preventDefault(); slot.classList.remove('active');\n      const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text);\n    });\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\n  });\n}\n\nfunction handleDrop(slot, vieText){\n  const engIndex = Number(slot.dataset.index);\n  const correctVie = pairs[engIndex].vie;\n  if(state.matches[engIndex]) return;\n  if(vieText === correctVie){\n    slot.classList.add('correct');\n    slot.innerHTML = `<div class=\"inner\"><span style=\"color:#10b981;margin-right:5px\">✓</span> <span style=\"font-weight:700;color:var(--success)\">${vieText}</span></div>`;\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\n  } else {\n    slot.classList.add('g-wrong'); setTimeout(()=> slot.classList.remove('g-wrong'), 420);\n    const vieEl = findVieElement(vieText);\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\n  }\n}\n\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.g-vie-item')).find(x => x.dataset.text === text); }\nfunction updateScore(){ scoreEl.innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\n\n/* confetti */\nfunction celebrate(){\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa'];\n  for(let i=0;i<18;i++){\n    const p = document.createElement('div'); p.className = 'piece';\n    p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px';\n    p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\n  }\n}\n\n/* controls */\ndocument.getElementById('shuffleBtn').addEventListener('click', () => {\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore();\n});\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\n\n/* touch fallback */\nlet currentPicked = null;\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\ndocument.addEventListener('click', (e) => { \n    if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-slot')) clearPicked(); \n});\n\n/* FLASHCARDS */\nlet flashIndex = 0; let flashAuto = null;\nconst flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\n\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\nfunction renderFlash(){\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\n  const p = pairs[flashIndex]; flashFront.textContent = p.eng; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\n}\ndocument.getElementById('nextCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); } });\ndocument.getElementById('prevCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); } });\ndocument.getElementById('flipCard').addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\nflashcardEl.addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { flashcardEl.classList.add('flipped'); setTimeout(()=> flashcardEl.classList.remove('flipped'), 1600); });\n\n/* FILL-IN */\nconst fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\nfunction renderFillList(){\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input');\n    input.addEventListener('focus', () => input.classList.remove('wrong'));\n    input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase();\n    const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n    } else {\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\n    }\n  });\n  fillScoreEl.textContent = `Điểm: ${correct} / ${pairs.length}`;\n});\n\ndocument.getElementById('showAnswers').addEventListener('click', () => {\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\n  });\n  fillScoreEl.textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\n});\n\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\n\n<\/script>\n\n<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n</body>\n\n</html>"},{"name":"LISTENING EXERCISE 1.html","filename":"LISTENING EXERCISE 1.html","content":"<!DOCTYPE html>\n<html lang=\"vi\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Listening Exercise</title>\n    <script src=\"https://cdn.tailwindcss.com\"><\/script>\n    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\">\n    <style>\n        ::-webkit-scrollbar { width: 8px; }\n        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }\n        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }\n        #transcript p { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; transition: all 0.3s; color: #64748b; cursor: pointer; border-left: 3px solid transparent; }\n        #transcript p:hover { background: #f8fafc; }\n        #transcript p.active { background: #eff6ff; color: #1e40af; font-weight: 500; border-left-color: #3b82f6; }\n        @keyframes sparkleAnim { 0% { transform: scale(1); text-shadow: none; color: inherit; } 50% { transform: scale(1.5); text-shadow: 0 0 10px #fbbf24; color: #d97706; } 100% { transform: scale(1); } }\n        .keyword-sparkle { transition: all 0.3s; border-bottom: 2px solid transparent; display: inline-block; }\n        .keyword-sparkle.trigger { animation: sparkleAnim 1.5s ease-in-out; font-weight: bold; border-bottom-color: #f59e0b; }\n        .text-highlight { background-color: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; font-weight: bold; transition: all 0.3s; }\n        #transcript p.active .text-highlight { background-color: #facc15; }\n        @keyframes pulseRed { 0% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.6; transform: scale(0.95); } }\n        .alert-badge { display: none; }\n        .alert-badge.show { display: inline-flex; animation: pulseRed 1s infinite; }\n        \n        input[type=\"text\"] { transition: all 0.3s; border-bottom: 2px solid #cbd5e1; padding: 2px 8px; text-align: center; color: #2563eb; font-weight: 600; background: #f8fafc; border-radius: 4px 4px 0 0; min-width: 60px; }\n        input[type=\"text\"]:focus { outline: none; border-bottom-color: #3b82f6; background: #eff6ff; }\n        input[type=\"text\"].highlight-input { background-color: #fef9c3; border-bottom-color: #eab308; transform: scale(1.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }\n        \n        /* Table Styles */\n        .generated-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9em; }\n        .generated-table td, .generated-table th { border: 1px solid #e2e8f0; padding: 8px; vertical-align: middle; }\n        .generated-table tr:nth-child(even) { background-color: #f8fafc; }\n        .generated-table tr:hover { background-color: #f1f5f9; }\n        .generated-table td input { width: 90%; min-width: 40px; }\n\n        .draggable-item { cursor: grab; background: white; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; display: inline-block; margin: 4px; font-size: 0.9em; box-shadow: 0 1px 2px rgba(0,0,0,0.05); user-select: none; }\n        .draggable-item:active { cursor: grabbing; border-color: #3b82f6; }\n        .draggable-item.used { opacity: 0.5; background: #f1f5f9; text-decoration: line-through; }\n        .drop-zone { display: inline-block; min-width: 80px; min-height: 28px; border: 2px dashed #cbd5e1; border-radius: 4px; background: #f8fafc; vertical-align: middle; margin: 0 4px; text-align: center; line-height: 24px; position: relative; }\n        .drop-zone.drag-over { background: #eff6ff; border-color: #3b82f6; }\n        .drop-zone .dropped-item { background: #dbeafe; color: #1e40af; padding: 0 8px; border-radius: 2px; display: inline-block; width: 100%; font-weight: bold; }\n        \n        /* Grading Styles */\n        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }\n        .incorrect-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }\n        .correct-text { color: #15803d; font-weight: bold; }\n        .correct-feedback { display: block; margin-top: 4px; color: #16a34a; font-weight: bold; font-size: 0.875rem; animation: fadeIn 0.5s; }\n        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }\n        .question-block { transition: all 0.3s; }\n        .question-block.highlight-block { border-left: 4px solid #ef4444; background: #fef2f2; padding-left: 12px; }\n        .question-block.correct { background-color: #f0fdf4 !important; border-left-color: #22c55e !important; }\n        .question-block.incorrect { background-color: #fef2f2 !important; border-left-color: #ef4444 !important; }\n\n        /* Resizer Styles */\n        .resizer-bar { width: 8px; background-color: #cbd5e1; cursor: col-resize; flex-shrink: 0; z-index: 30; transition: background-color 0.2s; display: flex; justify-content: center; align-items: center; border-left: 1px solid #94a3b8; border-right: 1px solid #94a3b8; box-shadow: 0 0 4px rgba(0,0,0,0.1); }\n        .resizer-bar:hover, .resizer-bar.active { background-color: #3b82f6; border-color: #2563eb; }\n        .resizer-bar::after { content: \"||\"; color: #475569; font-size: 10px; font-weight: bold; letter-spacing: -1px; }\n        @media (max-width: 768px) { .resizer-bar { display: none !important; } }\n    </style>\n</head>\n<body class=\"bg-gray-100 h-screen flex flex-col text-gray-800 overflow-hidden\">\n    <header class=\"bg-white shadow-sm p-3 flex justify-between items-center z-10 h-16 shrink-0 border-b border-gray-200\">\n        <h1 class=\"text-lg font-bold text-slate-700 flex items-center gap-2\"><i class=\"fa-solid fa-headphones text-blue-600\"></i> Listening Practice</h1>\n        <div class=\"flex gap-3 items-center\">\n            <div class=\"bg-slate-100 px-3 py-1 rounded-full text-sm font-mono text-slate-600 border border-slate-200\" id=\"timer\">00:00</div>\n            <button onclick=\"checkResults()\" class=\"bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-4 py-1.5 rounded shadow transition\"><i class=\"fa-solid fa-check mr-1\"></i> Nộp Bài</button>\n        </div>\n    </header>\n    \n    <main class=\"flex-1 flex flex-col md:flex-row overflow-hidden\" id=\"main-container\">\n        <div id=\"pane-transcript\" class=\"w-full md:w-[40%] flex flex-col border-r border-gray-200 bg-white relative shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 min-w-[250px]\">\n            <div class=\"p-4 bg-slate-900 text-white shadow-md shrink-0\">\n                <audio id=\"audio\" class=\"w-full h-10 mb-2 accent-blue-500\" controls><source src=\"https://ieltstrainingonline.com/wp-content/uploads/2021/07/Cam13-Test2-Section1.mp3\" type=\"audio/mpeg\"></audio>\n                <div class=\"flex items-center justify-between\"><span class=\"text-xs text-slate-400\"><i class=\"fa-solid fa-music mr-1\"></i>Audio Source</span><button onclick=\"toggleTrans()\" class=\"bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded text-xs transition border border-slate-500\">Ẩn Văn Bản</button></div>\n            </div>\n            <div id=\"transcript-container\" class=\"flex-1 overflow-y-auto p-4 md:p-6 bg-white scroll-smooth \"><div id=\"transcript\" class=\"text-base md:text-lg leading-relaxed max-w-2xl mx-auto\"><p data-time=\"0.000\">Section 1.</p>\n<p data-time=\"3.240\">You will hear a woman phoning the secretary of a</p>\n<p data-time=\"6.110\">cycling club to find out about becoming a member.</p>\n<p data-time=\"10.380\">First, you have some time to look at questions 1-6.</p>\n<p data-time=\"44.560\">You will see that there is an example that has been done for you.</p>\n<p data-time=\"49.480\">On this occasion only, the conversation relating to this will be played first.</p>\n<p data-time=\"57.850\">Hello, south city cycling club.</p>\n<p data-time=\"61.370\">Oh, hi.</p>\n<p data-time=\"62.650\">I want to find out about joining the club.</p>\n<p data-time=\"66.630\">Right.</p>\n<p data-time=\"66.990\">I can help you there.</p>\n<p data-time=\"68.690\">I\\'m the club secretary and my name is Jim Hunter.</p>\n<p data-time=\"72.610\">Oh, hi, Jim.</p>\n<p data-time=\"76.740\">The club secretary\\'s name is Jim Hunter.</p>\n<p data-time=\"80.140\">So Hunter has been written in the space.</p>\n<p data-time=\"84.460\">Now we shall begin.</p>\n<p data-time=\"87.700\">You should answer the questions as you listen because</p>\n<p data-time=\"91.405\">you will not hear the recording a second time.</p>\n<p data-time=\"95.900\">Listen carefully and answer questions 1-6.</p>\n<p data-time=\"103.400\">Hello, south city cycling club.</p>\n<p data-time=\"106.300\">Oh, hi.</p>\n<p data-time=\"107.740\">I want to find out about joining the club.</p>\n<p data-time=\"110.801\">Right.</p>\n<p data-time=\"112.100\">I can help you there.</p>\n<p data-time=\"113.680\">I\\'m the club secretary and my name is Jim Hunter.</p>\n<p data-time=\"117.520\">Oh, hi, Jim.</p>\n<p data-time=\"118.940\">So are you interested in membership for yourself?</p>\n<p data-time=\"122.420\">Let\\'s write.</p>\n<p data-time=\"123.820\">Okay.</p>\n<p data-time=\"124.700\">Well, there are basically two types of adult membership.</p>\n<p data-time=\"128.940\">If you\\'re pretty serious about cycling, there\\'s the full membership.</p>\n<p data-time=\"133.221\">That costs $260.</p>\n<p data-time=\"137.120\">And that covers you not just for ordinary cycling, but also for</p>\n<p data-time=\"141.884\">races both here in the city and also in other parts of Australia.</p>\n<p data-time=\"147.620\">Right.</p>\n<p data-time=\"148.040\">Well, I\\'m not really up to that standard.</p>\n<p data-time=\"150.500\">I was more interested in just joining a group to do some cycling in my free time.</p>\n<p data-time=\"155.580\">Sure.</p>\n<p data-time=\"156.580\">That\\'s why most people join.</p>\n<p data-time=\"158.241\">So in that case, you\\'d be better with the recreational membership.</p>\n<p data-time=\"164.140\">That\\'s $108 if you\\'re over 19 and $95 if you\\'re under.</p>\n<p data-time=\"171.380\">I\\'m 25.</p>\n<p data-time=\"173.760\">Okay.</p>\n<p data-time=\"174.000\">It\\'s paid quarterly and you can upgrade it later</p>\n<p data-time=\"177.040\">to the full membership if you want to of course.</p>\n<p data-time=\"180.920\">Now, both types of membership include the club fee of $20.</p>\n<p data-time=\"185.201\">They also provide insurance in case you have an</p>\n<p data-time=\"189.053\">accident, though we hope you won\\'t need that of course.</p>\n<p data-time=\"194.080\">No.</p>\n<p data-time=\"194.980\">Okay.</p>\n<p data-time=\"195.900\">Well, I\\'ll go with the recreational membership, I think,</p>\n<p data-time=\"199.019\">and that allows me to join in the club activities and so on.</p>\n<p data-time=\"202.700\">That\\'s right.</p>\n<p data-time=\"203.780\">And once you\\'re a member of the club, you\\'re also</p>\n<p data-time=\"206.720\">permitted to wear a kit when you\\'re out cycling.</p>\n<p data-time=\"210.220\">It\\'s green and white.</p>\n<p data-time=\"211.521\">Yes, I\\'ve seen cyclists wearing it.</p>\n<p data-time=\"214.840\">So can I buy that at the club?</p>\n<p data-time=\"217.520\">And no, it\\'s made to order by a company in Brisbane.</p>\n<p data-time=\"221.600\">You can find them online.</p>\n<p data-time=\"223.720\">They\\'re called Jerry\\'s.</p>\n<p data-time=\"225.800\">That\\'s J-E-R-R-I-Z.</p>\n<p data-time=\"231.300\">You can use your membership number to put in an order on their website.</p>\n<p data-time=\"235.580\">Okay.</p>\n<p data-time=\"236.840\">Now, can you tell me a bit about the rides I can do?</p>\n<p data-time=\"239.561\">Sure.</p>\n<p data-time=\"240.980\">So we have training rides pretty well every morning and there are really good</p>\n<p data-time=\"245.896\">way of improving your cycling skills, as well as your general level of fitness.</p>\n<p data-time=\"251.740\">But there are different levels.</p>\n<p data-time=\"254.160\">Level A is pretty fast.</p>\n<p data-time=\"256.480\">You\\'re looking at about 30 or 35 kilometers an hour.</p>\n<p data-time=\"261.060\">If you can do about 25 kilometers an hour, you\\'d probably be level B.</p>\n<p data-time=\"267.281\">And then level C are the novices who stay at about 15 kilometers per hour.</p>\n<p data-time=\"274.180\">Right.</p>\n<p data-time=\"274.740\">Well, I reckon I\\'d be level B.</p>\n<p data-time=\"277.880\">So what are the sessions for that level?</p>\n<p data-time=\"280.920\">There are a couple each week.</p>\n<p data-time=\"283.020\">They\\'re both early morning sessions.</p>\n<p data-time=\"285.580\">There\\'s one on Tuesdays and for that one you meet at 5.30 a.m.</p>\n<p data-time=\"291.140\">And the meeting points the stadium.</p>\n<p data-time=\"294.120\">Do you know where that is?</p>\n<p data-time=\"295.301\">Yes, it\\'s quite near my home, in fact.</p>\n<p data-time=\"298.640\">Okay.</p>\n<p data-time=\"299.120\">And how about the other one?</p>\n<p data-time=\"301.100\">That\\'s on Thursdays.</p>\n<p data-time=\"302.940\">It starts at the same time, but they meet at the main gate to the park.</p>\n<p data-time=\"308.120\">Is that the one just passed the shopping mall?</p>\n<p data-time=\"311.060\">That\\'s it.</p>\n<p data-time=\"315.080\">Before you hear the rest of the conversation,</p>\n<p data-time=\"318.332\">you have some time to look at questions 7 to 10.</p>\n<p data-time=\"341.550\">Now listen, and answer questions 7 to 10.</p>\n<p data-time=\"349.000\">So how long are the rides?</p>\n<p data-time=\"351.260\">They\\'re about an hour and a half.</p>\n<p data-time=\"354.580\">So if you have a job, it\\'s easy to fit in before you go to work.</p>\n<p data-time=\"359.100\">And the members often go somewhere for coffee</p>\n<p data-time=\"362.250\">afterwards, so it\\'s quite a social event.</p>\n<p data-time=\"365.520\">Okay, that sounds good.</p>\n<p data-time=\"367.740\">I\\'ve only just moved to the city, so I don\\'t actually know many people yet.</p>\n<p data-time=\"371.701\">Well, it\\'s a great way to meet people.</p>\n<p data-time=\"374.760\">And does each ride have a leader?</p>\n<p data-time=\"377.520\">Sometimes, but not always, but you don\\'t really need one.</p>\n<p data-time=\"382.36
