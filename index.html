prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\ if: Đoạn ' + pChar;\n    \n    let enHtml = '', viHtml = '';\n    para.en.forEach((s, i) => { enHtml += `<div class=\"mif-en-sent\" onmouseenter=\"hlMifVi(${i}, true)\" onmouseleave=\"hlMifVi(${i}, false)\">${s}</div>`; });\n    para.vi.forEach((s, i) => { viHtml += `<div class=\"mif-vi-sent\" id=\"mif-vi-${i}\">${s}</div>`; });\n    document.getElementById('mif-en-col').innerHTML = enHtml;\n    document.getElementById('mif-vi-col').innerHTML = viHtml;\n    \n    let qsHtml = '';\n    mifMap[pChar].forEach(q => {\n        const mainRadio = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n        const isChecked = mainRadio && mainRadio.value === pChar ? 'checked' : '';\n        qsHtml += `\n        <div class=\"q-block\" style=\"background:#fff\">\n            <div style=\"font-weight:bold;margin-bottom:8px;font-size:15px\"><span class=\"q-num\">${q.id}.</span> ${q.text}</div>\n            <label class=\"mif-label\" style=\"display:inline-block\">\n                <input type=\"checkbox\" ${isChecked} onchange=\"syncMif(${q.id}, '${pChar}', this.checked)\">\n                <span class=\"mif-circle\" style=\"width:auto;padding:0 20px;border-radius:20px;height:40px;cursor:pointer\">Chọn đoạn ${pChar}</span>\n            </label>\n        </div>`;\n    });\n    document.getElementById('mif-qs-container').innerHTML = qsHtml;\n    \n    document.getElementById('mif-prev').disabled = currentMifIndex === 0;\n    document.getElementById('mif-next').innerText = currentMifIndex === mifParaChars.length - 1 ? \"Hoàn thành\" : \"Next ➡\";\n};\n\nwindow.hlMifVi = (i, isEnter) => { const el = document.getElementById('mif-vi-'+i); if(el) el.style.background = isEnter ? '#fef08a' : 'transparent'; };\n\nwindow.syncMif = (qId, pChar, isChecked) => {\n    const mainRadio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n    if(mainRadio) {\n        mainRadio.checked = isChecked;\n        if(isChecked) upd(qId);\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n            const btnPara = btn.closest('.mif-inline-box').dataset.para;\n            if(btnPara === pChar) { isChecked ? btn.classList.add('selected') : btn.classList.remove('selected'); isChecked ? btn.classList.remove('hidden-by-other') : null; } \n            else { isChecked ? btn.classList.add('hidden-by-other') : btn.classList.remove('hidden-by-other'); isChecked ? btn.classList.remove('selected') : null; }\n        });\n    }\n};\n\nwindow.navMif = (dir) => { if(dir === 1 && currentMifIndex === mifParaChars.length - 1) { toggleMifMode(); return; } currentMifIndex += dir; renderMifFocus(); };\n\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\nlet currentPicked = null;\n\nfunction toggleGame() {\n    const g = document.getElementById('game-view'); const r = document.getElementById('reading-view');\n    if(g.style.display === 'block') { g.style.display = 'none'; r.style.display = 'flex'; } \n    else { g.style.display = 'block'; r.style.display = 'none'; if(pairs.length > 0) initGame(); }\n}\n\nfunction shuffleArray(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }\n\nfunction initGame(){\n  const engListEl = document.getElementById('engList');\n  state.matches = {}; state.score = 0;\n  if(pairs.length === 0) { engListEl.innerHTML = '<div style=\"color:white;padding:20px\">No vocab data selected in the Generator!</div>'; return; }\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\n}\n\nfunction renderEng(){\n  const engListEl = document.getElementById('engList'); engListEl.innerHTML = '';\n  state.engOrder.forEach((origIndex, pos) => {\n    const p = pairs[origIndex]; const item = document.createElement('div'); item.className = 'g-eng-item'; item.dataset.origIndex = origIndex;\n    item.innerHTML = `<div class=\"g-eng-left\"><div class=\"g-index\">${pos+1}</div><div><div style=\"font-weight:700\">${p.eng}</div><div style=\"font-size:13px; color:var(--muted)\">English</div></div></div><div class=\"g-slot\" data-index=\"${origIndex}\" aria-label=\"drop slot\" tabindex=\"0\"><div class=\"inner\"></div></div>`;\n    engListEl.appendChild(item);\n  });\n}\n\nfunction renderVie(){\n  const vieListEl = document.getElementById('vieList'); vieListEl.innerHTML = '';\n  state.shuffledVie.forEach((text, idx) => {\n    const d = document.createElement('div'); d.className = 'g-vie-item'; d.draggable = true; d.dataset.text = text; d.id = 'vie-'+idx; d.innerHTML = `<span style=\"font-weight:600\">${text}</span>`; vieListEl.appendChild(d);\n    d.addEventListener('dragstart', e => { d.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); currentPicked = {text, el:d}; });\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\n    d.addEventListener('click', () => { if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; } else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; } });\n  });\n}\n\nfunction attachSlotEvents(){\n  const slots = document.querySelectorAll('.g-slot');\n  slots.forEach(slot => {\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\n    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('active'); const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text); });\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\n  });\n}\n\nfunction handleDrop(slot, vieText){\n  const engIndex = Number(slot.dataset.index); const correctVie = pairs[engIndex].vie; if(state.matches[engIndex]) return;\n  if(vieText === correctVie){\n    slot.classList.add('correct'); slot.innerHTML = `<div class=\"inner\"><span style=\"color:#10b981;margin-right:5px\">✓</span> <span style=\"font-weight:700;color:var(--success)\">${vieText}</span></div>`;\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\n  } else {\n    slot.classList.add('g-wrong'); setTimeout(()=> slot.classList.remove('g-wrong'), 420);\n    const vieEl = findVieElement(vieText);\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\n  }\n}\n\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.g-vie-item')).find(x => x.dataset.text === text); }\nfunction updateScore(){ document.getElementById('score').innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\n\nfunction celebrate(){\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa']; const confettiEl = document.getElementById('confetti');\n  for(let i=0;i<18;i++){\n    const p = document.createElement('div'); p.className = 'piece'; p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px'; p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\n  }\n}\n\ndocument.getElementById('shuffleBtn').addEventListener('click', () => { state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie)); renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore(); });\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\n\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\ndocument.addEventListener('click', (e) => { if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-slot')) clearPicked(); });\n\nlet flashIndex = 0; let flashAuto = null;\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\nfunction renderFlash(){\n  const flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\n  const p = pairs[flashIndex]; flashFront.textContent = p.eng; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\n}\ndocument.getElementById('nextCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); } });\ndocument.getElementById('prevCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); } });\ndocument.getElementById('flipCard').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.toggle('flipped'); f.setAttribute('aria-pressed', f.classList.contains('flipped')); });\ndocument.getElementById('flashcard').addEventListener('click', function() { this.classList.toggle('flipped'); this.setAttribute('aria-pressed', this.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.add('flipped'); setTimeout(()=> f.classList.remove('flipped'), 1600); });\n\nfunction renderFillList(){\n  const fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input'); input.addEventListener('focus', () => input.classList.remove('wrong')); input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList'); let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`); const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase(); const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n    } else {\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\n    }\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${correct} / ${pairs.length}`;\n});\n\ndocument.getElementById('showAnswers').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList');\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\n});\n\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\n\nwindow.onload = () => {\n    if (document.body.getAttribute('data-is-graded') === 'true') {\n        document.getElementById('lesson-selector').disabled = true;\n        const submitBtn = document.getElementById('submitBtn');\n        if(submitBtn) submitBtn.style.display = 'none';\n        const saveBtn = document.getElementById('saveBtn');\n        if(saveBtn) saveBtn.style.display = 'none';\n        clearInterval(timerInterval);\n        document.getElementById('timer').style.display = 'none';\n        return;\n    }\n\n    const sel = document.getElementById('lesson-selector');\n    sel.innerHTML = '';\n    lessonsData.forEach((l, i) => {\n        const opt = document.createElement('option');\n        opt.value = i; opt.innerText = l.name;\n        sel.appendChild(opt);\n    });\n    switchLesson(0);\n};\n<\/script>\n\n<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n</body>\n</html>"},{"name":"(05.03.2026) Moving to Banford City.html","filename":"(05.03.2026) Moving to Banford City.html","content":"<!DOCTYPE html>\n<html lang=\"vi\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Listening Exercise</title>\n    <script src=\"https://cdn.tailwindcss.com\"><\/script>\n    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\">\n    <style>\n        ::-webkit-scrollbar { width: 8px; }\n        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }\n        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }\n        #transcript p { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; transition: all 0.3s; color: #64748b; cursor: pointer; border-left: 3px solid transparent; }\n        #transcript p:hover { background: #f8fafc; }\n        #transcript p.active { background: #eff6ff; color: #1e40af; font-weight: 500; border-left-color: #3b82f6; }\n        @keyframes sparkleAnim { 0% { transform: scale(1); text-shadow: none; color: inherit; } 50% { transform: scale(1.5); text-shadow: 0 0 10px #fbbf24; color: #d97706; } 100% { transform: scale(1); } }\n        .keyword-sparkle { transition: all 0.3s; border-bottom: 2px solid transparent; display: inline-block; }\n        .keyword-sparkle.trigger { animation: sparkleAnim 1.5s ease-in-out; font-weight: bold; border-bottom-color: #f59e0b; }\n        .text-highlight { background-color: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; font-weight: bold; transition: all 0.3s; }\n        #transcript p.active .text-highlight { background-color: #facc15; }\n        @keyframes pulseRed { 0% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.6; transform: scale(0.95); } }\n        .alert-badge { display: none; }\n        .alert-badge.show { display: inline-flex; animation: pulseRed 1s infinite; }\n        \n        input[type=\"text\"] { transition: all 0.3s; border-bottom: 2px solid #cbd5e1; padding: 2px 8px; text-align: center; color: #2563eb; font-weight: 600; background: #f8fafc; border-radius: 4px 4px 0 0; min-width: 60px; }\n        input[type=\"text\"]:focus { outline: none; border-bottom-color: #3b82f6; background: #eff6ff; }\n        input[type=\"text\"].highlight-input { background-color: #fef9c3; border-bottom-color: #eab308; transform: scale(1.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }\n        \n        /* Table Styles */\n        .generated-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9em; }\n        .generated-table td, .generated-table th { border: 1px solid #e2e8f0; padding: 8px; vertical-align: middle; }\n        .generated-table tr:nth-child(even) { background-color: #f8fafc; }\n        .generated-table tr:hover { background-color: #f1f5f9; }\n        .generated-table td input { width: 90%; min-width: 40px; }\n\n        .draggable-item { cursor: grab; background: white; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; display: inline-block; margin: 4px; font-size: 0.9em; box-shadow: 0 1px 2px rgba(0,0,0,0.05); user-select: none; }\n        .draggable-item:active { cursor: grabbing; border-color: #3b82f6; }\n        .draggable-item.used { opacity: 0.5; background: #f1f5f9; text-decoration: line-through; }\n        .drop-zone { display: inline-block; min-width: 80px; min-height: 28px; border: 2px dashed #cbd5e1; border-radius: 4px; background: #f8fafc; vertical-align: middle; margin: 0 4px; text-align: center; line-height: 24px; position: relative; }\n        .drop-zone.drag-over { background: #eff6ff; border-color: #3b82f6; }\n        .drop-zone .dropped-item { background: #dbeafe; color: #1e40af; padding: 0 8px; border-radius: 2px; display: inline-block; width: 100%; font-weight: bold; }\n        \n        /* Grading Styles */\n        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }\n        .incorrect-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }\n        .correct-text { color: #15803d; font-weight: bold; }\n        .correct-feedback { display: block; margin-top: 4px; color: #16a34a; font-weight: bold; font-size: 0.875rem; animation: fadeIn 0.5s; }\n        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }\n        .question-block { transition: all 0.3s; }\n        .question-block.highlight-block { border-left: 4px solid #ef4444; background: #fef2f2; padding-left: 12px; }\n        .question-block.correct { background-color: #f0fdf4 !important; border-left-color: #22c55e !important; }\n        .question-block.incorrect { background-color: #fef2f2 !important; border-left-color: #ef4444 !important; }\n\n        /* Resizer Styles */\n        .resizer-bar { width: 8px; background-color: #cbd5e1; cursor: col-resize; flex-shrink: 0; z-index: 30; transition: background-color 0.2s; display: flex; justify-content: center; align-items: center; border-left: 1px solid #94a3b8; border-right: 1px solid #94a3b8; box-shadow: 0 0 4px rgba(0,0,0,0.1); }\n        .resizer-bar:hover, .resizer-bar.active { background-color: #3b82f6; border-color: #2563eb; }\n        .resizer-bar::after { content: \"||\"; color: #475569; font-size: 10px; font-weight: bold; letter-spacing: -1px; }\n        @media (max-width: 768px) { .resizer-bar { display: none !important; } }\n    </style>\n</head>\n<body class=\"bg-gray-100 h-screen flex flex-col text-gray-800 overflow-hidden\">\n    <header class=\"bg-white shadow-sm p-3 flex justify-between items-center z-10 h-16 shrink-0 border-b border-gray-200\">\n        <h1 class=\"text-lg font-bold text-slate-700 flex items-center gap-2\"><i class=\"fa-solid fa-headphones text-blue-600\"></i> Listening Practice</h1>\n        <div class=\"flex gap-3 items-center\">\n            <div class=\"bg-slate-100 px-3 py-1 rounded-full text-sm font-mono text-slate-600 border border-slate-200\" id=\"timer\">00:00</div>\n            <button onclick=\"checkResults()\" class=\"bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-4 py-1.5 rounded shadow transition\"><i class=\"fa-solid fa-check mr-1\"></i> Nộp Bài</button>\n        </div>\n    </header>\n    \n    <main class=\"flex-1 flex flex-col md:flex-row overflow-hidden\" id=\"main-container\">\n        <div id=\"pane-transcript\" class=\"w-full md:w-[40%] flex flex-col border-r border-gray-200 bg-white relative shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 min-w-[250px]\">\n            <div class=\"p-4 bg-slate-900 text-white shadow-md shrink-0\">\n                <audio id=\"audio\" class=\"w-full h-10 mb-2 accent-blue-500\" controls><source src=\"https://ieltstrainingonline.com/wp-content/uploads/2021/07/Cam13-Test3-Section1.mp3\" type=\"audio/mpeg\"></audio>\n                <div class=\"flex items-center justify-between\"><span class=\"text-xs text-slate-400\"><i class=\"fa-solid fa-music mr-1\"></i>Audio Source</span><button onclick=\"toggleTrans()\" class=\"bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded text-xs transition border border-slate-500\">Ẩn Văn Bản</button></div>\n            </div>\n            <div id=\"transcript-container\" class=\"flex-1 overflow-y-auto p-4 md:p-6 bg-white scroll-smooth \"><div id=\"transcript\" class=\"text-base md:text-lg leading-relaxed max-w-2xl mx-auto\"><p data-time=\"1.600\">Section 1.</p>\n<p data-time=\"3.880\">You will hear a man phoning a woman who lives in an English city</p>\n<p data-time=\"7.895\">called Banford to get some advice about moving to that city.</p>\n<p data-time=\"13.560\">First, you have some time to look at questions 1-5.</p>\n<p data-time=\"42.640\">You will see that there is an example that has been done for you.</p>\n<p data-time=\"47.320\">On this occasion only, the conversation relating to this will be played first.</p>\n<p data-time=\"55.580\">Hello, Linda speaking.</p>\n<p data-time=\"58.840\">Oh, Hi Linda.</p>\n<p data-time=\"60.400\">This is Matt Brooks.</p>\n<p data-time=\"62.340\">Alex White gave me your number.</p>\n<p data-time=\"64.840\">He said you\\'d be able to give me some advice about moving to Banford.</p>\n<p data-time=\"68.960\">Yes!</p>\n<p data-time=\"70.120\">Alex did mention you.</p>\n<p data-time=\"72.400\">How\\'d my help?</p>\n<p data-time=\"74.000\">Well, first of all, which area to live in?</p>\n<p data-time=\"78.301\">Well, I live in Dalton, which is a really nice suburb.</p>\n<p data-time=\"84.680\">Not too expensive, and there\\'s a nice park.</p>\n<p data-time=\"92.440\">Linda recommends a suburb called Dalton.</p>\n<p data-time=\"95.960\">So Dalton has been written in the space.</p>\n<p data-time=\"100.440\">Now we shall begin.</p>\n<p data-time=\"102.940\">You should answer the questions as you listen,</p>\n<p data-time=\"105.663\">because you will not hear the recording a second time.</p>\n<p data-time=\"110.500\">Listen carefully, and answer questions 1-5.</p>\n<p data-time=\"118.660\">Hello, Linda speaking.</p>\n<p data-time=\"121.160\">Oh, Hi Linda.</p>\n<p data-time=\"122. List.add('active'); if (!document.getElementById('transcript-container').classList.contains('hidden')) { if (current !== activePara) current.scrollIntoView({ behavior: 'smooth', block: 'center' }); } activePara = current; current.querySelectorAll('.keyword-sparkle').forEach(sp => { sp.classList.remove('trigger'); void sp.offsetWidth; sp.classList.add('trigger'); const targetId = sp.dataset.targetInput; if (targetId) { const inputEl = document.getElementById(targetId); if (inputEl) { inputEl.classList.add('highlight-input'); setTimeout(() => inputEl.classList.remove('highlight-input'), 2000); } } }); }\n            alerts.forEach(al => { let parentP = al.closest('p'); if(!parentP) { let prev = al.previousElementSibling; while(prev&&prev.tagName!=='P') prev=prev.previousElementSibling; if(prev) parentP=prev; } if(parentP && parentP.dataset.time) { const t = parseFloat(parentP.dataset.time); if (time >= t && time < t + 1) { const targetId = al.dataset.targetQuestion; if (targetId) { const badge = document.getElementById('badge-' + targetId); const block = document.getElementById(targetId); if(badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 5000); } if(block) { block.classList.add('highlight-block'); setTimeout(() => block.classList.remove('highlight-block'), 5000); block.scrollIntoView({ behavior: 'smooth', block: 'center' }); } } } } });\n        });\n        paragraphs.forEach(p => { p.addEventListener('click', () => { audio.currentTime = parseFloat(p.dataset.time); audio.play(); }); });\n        \n        // RESIZER LOGIC\n        function initResize() {\n           const mainContainer = document.getElementById('main-container');\n           if(!mainContainer || window.innerWidth < 768) return; \n\n           const resizer1 = document.getElementById('resizer-1');\n           const paneTrans = document.getElementById('pane-transcript');\n           if(resizer1 && paneTrans) {\n               resizer1.addEventListener('mousedown' nMouseMove); document.removeEventListener('mouseup', onMouseUp); }\n                   document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);\n               });\n           }\n        }\n        window.addEventListener('load', initResize);\n        window.addEventListener('resize', initResize);\n    <\/script>\n</body>\n</html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
